# Lokale/Referenz-Deployment-Definition mit Resource-Limits (SCALE-006).
# Für Render/Railway dienen die Limits als Vorlage für die Plattform-Settings.
services:
  zh-education-mcp:
    build: .
    image: zh-education-mcp:latest
    ports:
      - "8000:8000"
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      MCP_STATELESS_HTTP: "true"
      # In Produktion auf die tatsächlich genutzten Origins setzen:
      MCP_CORS_ORIGINS: "https://claude.ai"
    restart: unless-stopped
    # Resource-Limits (SCALE-006): begrenzter Memory/CPU/FD-Verbrauch.
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5
    pids_limit: 256
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Defense-in-Depth (SEC-007): keine neuen Privilegien, root-FS read-only.
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
